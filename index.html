<style>
body{
    margin:0;

    background: linear-gradient(180deg, #6a1b9a, #4a148c);
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding-bottom: 40px;
}

.container{ width:360px; margin-top:40px; }

.card{
    background:white;
    border-radius:20px;
    padding:20px;

input{

    box-sizing: border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
    background:#6a1b9a;
    color:white;
    font-weight:bold;
}

#constancia{ display:none; }

/* ESTILOS DE LA CONSTANCIA */
.top-header{ display:flex; justify-content:space-between; align-items:center; }
.status{ font-size:18px; font-weight:900; color:#6a1b9a; }
.share{ display:flex; align-items:center; gap:6px; color:#2ec4b6; font-size:14px; font-weight:bold; }
.icon{ width:16px; height:16px; }
.amount{ font-size:42px; font-weight:bold; margin-top:15px; }
.currency{ font-size:24px; font-weight:bold; vertical-align:super; margin-right:2px; }
.name{ font-size:18px; font-weight:bold; margin-top:10px; }
.date{ font-size:14px; color:#777; margin-top:6px; display:flex; align-items:center; gap:6px; }
.divider{ height:1px; background:#e5e5e5; margin:18px 0; }
.security{ display:flex; justify-content:space-between; align-items:center; }
.security-left{ display:flex; align-items:center; gap:6px; }
.security-left strong{ font-size:11px; }
.info-btn{ background:#2ec4b6; color:white; width:18px; height:18px; border-radius:50%; display:flex; justify-content:center; align-items:center; font-size:12px; }
.code-box{ display:flex; gap:8px; }
.code-box div{ background:#e8e1f5; color:#6a1b9a; width:28px; height:28px; border-radius:8px; display:flex; justify-content:center; align-items:center; font-weight:bold; }
.section-title{ font-weight:bold; font-size:12px; margin-bottom:10px; }
.row{ display:flex; justify-content:space-between; margin-bottom:8px; font-size:14px; }
.label{ color:#555; }
.value{ font-weight:bold; }

.popup{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.4);
    justify-content:center;
    align-items:center;
}

.popup-content{ background:white; padding:20px; border-radius:15px; width:250px; text-align:center; font-weight:bold; }

.btn-reset{
    display:none;
    margin-top:15px;
    width:360px;
    background:rgba(255, 255, 255, 0.15);
    border: 1px solid white;
    font-size: 13px;
}

/* FOOTER Y BOTONES */
.footer{
    margin-top:30px;
    width: 360px;
    text-align:center;
    color:white;
}

.footer strong {
    display: block;
    font-size: 12px;
    margin-bottom: 12px;
    opacity: 0.9;
}

.btn-exclusivo {
    display: block;
    background: #ffcc00;
    color: #333 !important;
    text-decoration: none;
    font-weight: 900;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    font-size: 14px;
    box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
    transition: 0.2s;
}

.footer-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.btn-footer{
    padding: 10px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    color: white;
    font-size: 11px;
    transition: 0.2s;
    display: flex;
    justify-content: center;
    align-items: center;
}

.btn-footer:hover, .btn-exclusivo:hover{ transform:scale(1.03); }

.btn-wsp{ background:#25D366; }
.btn-azul{ background:#2196F3; }
.btn-grupo{ background:#128C7E; }
.btn-insta{ background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4); }
</style>
</head>

<body>

        <div class="top-header">
            <div class="status">¡Yapeaste!</div>
            <div class="share">
                <svg class="icon" fill="#2ec4b6" viewBox="0 0 24 24"><path d="M18 16a3 3 0 00-2.24 1.03l-7.12-3.56a3.04 3.04 0 000-2.94l7.12-3.56A3 3 0 1015 5a2.96 2.96 0 00.06.59L7.94 9.15a3 3 0 100 5.7l7.12 3.56A3 3 0 1018 16z"/></svg>
                Compartir
            </div>
        </div>
        <div class="amount" id="montoRes"></div>
        <div class="name" id="nombreRes"></div>
        <div class="date">
            <svg class="icon" fill="none" stroke="#777" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="3" y1="10" x2="21" y2="10"></line></svg>

        <a class="btn-footer btn-grupo" href="https://chat.whatsapp.com/E6UZhymVHGtDBLIr1s9Ekg" target="_blank">GRUPO WSP</a>
        <a class="btn-footer btn-insta" href="https://instagram.com/stevenv.ff" target="_blank">INSTAGRAM</a>

</div>

<div id="popupError" class="popup">
    <div class="popup-content">Monto máximo es 500</div>
</div>

<script>
function simular(){
    let nombre=document.getElementById("nombre").value;
    let numero=document.getElementById("numero").value;
    let monto=document.getElementById("monto").value;
    if(!nombre||!numero||monto==="") return;

    if(parseFloat(monto) > 500){
        document.getElementById("popupError").style.display="flex";
        setTimeout(()=>{document.getElementById("popupError").style.display="none";},2000);
        return;
    }

    let ahora=new Date();
    let fecha=ahora.toLocaleDateString('es-PE',{day:'numeric',month:'short',year:'numeric'});
    let hora=ahora.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit',hour12:true}).replace('AM','a. m.').replace('PM','p. m.');

    let codigo=Math.floor(100+Math.random()*900).toString();
    let codigoHTML="";
    for(let i=0;i<3;i++){codigoHTML+="<div>"+codigo[i]+"</div>";}
    let operacion=Math.floor(Math.random()*90000000)+10000000;

    document.getElementById("formulario").style.display="none";
    document.getElementById("constancia").style.display="block";
    document.getElementById("btnReset").style.display="block";

    document.getElementById("montoRes").innerHTML='<span class="currency">S/</span>'+monto;
    document.getElementById("nombreRes").innerHTML=nombre+"*";
    document.getElementById("numeroRes").innerHTML="*** *** "+numero.slice(-3);
    document.getElementById("fecha").innerHTML=fecha;
    document.getElementById("hora").innerHTML=hora;
    document.getElementById("codigoSeguridad").innerHTML=codigoHTML;
    document.getElementById("operacion").innerHTML=operacion;
}

function rojearDeNuevo(){
    document.getElementById("constancia").style.display="none";
    document.getElementById("formulario").style.display="block";
    document.getElementById("btnReset").style.display="none";
    document.getElementById("nombre").value="";
    document.getElementById("numero").value="";
    document.getElementById("monto").value="";
}
</script>

</body>
