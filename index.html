<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema en Mantenimiento | EderTech</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary-glow: #00f2fe;
            --secondary-glow: #4facfe;
            --accent: #00ff88;
            --bg-dark: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --yape-color: #742d8a;
            --bcp-color: #fbba00;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0f0f0f 100%);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }

        /* --- ANIMACIÓN DE CARGA --- */
        .loader-box { margin-bottom: 30px; }
        .orbit {
            width: 65px; height: 65px;
            border: 3px solid transparent;
            border-radius: 50%;
            border-top-color: var(--primary-glow);
            margin: 0 auto;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px var(--primary-glow);
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .loading-text {
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--primary-glow);
            margin-top: 20px;
            animation: pulse 1.8s ease-in-out infinite;
        }

        /* --- TÍTULOS --- */
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.7rem;
            margin: 10px 0;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, #888888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.desc { font-weight: 300; color: #aaaaaa; margin-bottom: 35px; font-size: 0.95rem; line-height: 1.4; }

        /* --- BOTONES PRINCIPALES --- */
        .btn-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px;
            margin: 14px 0;
            border-radius: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-support {
            background: rgba(37, 211, 102, 0.08);
            border: 1px solid #25d366;
            color: #25d366;
        }

        .btn-buy {
            background: linear-gradient(45deg, var(--primary-glow), var(--secondary-glow));
            color: #000000;
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.25);
        }

        .btn-main:active { transform: scale(0.96); opacity: 0.8; }

        /* --- MODAL DE VENTAS (CARTELERA) --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.97);
            backdrop-filter: blur(12px);
            z-index: 999;
        }

        .modal-content {
            padding: 25px;
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bank-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 22px;
            padding: 24px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 340px;
            text-align: center;
        }

        .bank-card i { font-size: 2.8rem; margin-bottom: 12px; }
        .yape-icon { color: var(--yape-color); }
        .bcp-icon { color: var(--bcp-color); }
        .combo-icon { color: #ff4500; }

        .price-tag {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent);
            margin: 12px 0;
        }

        .btn-view {
            background: rgba(255,255,255,0.07);
            color: #ffffff;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 12px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        /* --- VISOR DE IMAGEN --- */
        #imgViewer {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        #imgViewer img { max-width: 90%; max-height: 85%; border-radius: 12px; border: 2px solid #333; }

        .close-btn {
            position: absolute;
            top: 25px; right: 25px;
            font-size: 2.2rem; color: #ffffff;
            cursor: pointer;
            z-index: 10001;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<div class="container animate__animated animate__fadeIn">
    
    <div class="loader-box">
        <div class="orbit"></div>
        <div class="loading-text">Cargando Sistema</div>
    </div>

    <h1>MANTENIMIENTO</h1>
    <p class="desc">Estamos mejorando nuestra infraestructura.<br>Vuelve pronto para ver las novedades.</p>

    <a href="https://wa.me/51992867258?text=hola%20vengo%20de%20tu%20sistema%20de%20yape%20y%20plin%20fake%20quisiera%20saber%20hasta%20cuándo%20va%20estar%20en%20mantenimiento" class="btn-main btn-support">
        <i class="fab fa-whatsapp"></i> Soporte WhatsApp
    </a>

    <button class="btn-main btn-buy" onclick="openStore()">
        <i class="fas fa-shopping-cart"></i> COMPRAR BANCOS FAKE
    </button>

</div>

<div id="storeModal" class="modal">
    <div class="close-btn" onclick="closeStore()"><i class="fas fa-times"></i></div>
    
    <div class="modal-content">
        <h2 style="font-family: 'Montserrat'; margin-bottom: 30px; letter-spacing: 1px;">CATÁLOGO APKS</h2>
        
        <div class="bank-card animate__animated animate__fadeInUp">
            <i class="fas fa-qrcode yape-icon"></i>
            <h3>YAPE FAKE</h3>
            <div class="price-tag">S/ 15.00</div>
            <button class="btn-view" onclick="viewPhoto('yape.jpeg')">Ver Resultado</button>
            <a href="https://wa.me/51992867258?text=Hola,%20vengo%20por%20la%20APK%20YAPE%20FAKE.%20Precio:%20S/15.%20Solicito%20método%20de%20pago." class="btn-main btn-support" style="font-size: 0.9rem; padding: 14px;">Comprar Ahora</a>
        </div>

        <div class="bank-card animate__animated animate__fadeInUp" style="animation-delay: 0.1s;">
            <i class="fas fa-university bcp-icon"></i>
            <h3>BCP FAKE</h3>
            <div class="price-tag">S/ 15.00</div>
            <button class="btn-view" onclick="viewPhoto('bcp.jpeg')">Ver Resultado</button>
            <a href="https://wa.me/51992867258?text=Hola,%20vengo%20por%20la%20APK%20BCP%20FAKE.%20Precio:%20S/15.%20Solicito%20método%20de%20pago." class="btn-main btn-support" style="font-size: 0.9rem; padding: 14px;">Comprar Ahora</a>
        </div>

        <div class="bank-card animate__animated animate__fadeInUp" style="animation-delay: 0.2s; border: 1px solid var(--accent);">
            <i class="fas fa-gift combo-icon"></i>
            <h3>COMBO (YAPE + BCP)</h3>
            <div class="price-tag" style="color: #ffffff;">S/ 25.00</div>
            <button class="btn-view" onclick="viewPhoto('combo.jpeg')">Ver Resultado</button>
            <a href="https://wa.me/51992867258?text=Hola,%20quiero%20el%20COMBO%20YAPE%20+%20BCP.%20Precio:%20S/25.%20Solicito%20método%20de%20pago." class="btn-main btn-support" style="font-size: 0.9rem; padding: 14px; background: var(--accent); color: #000; border: none;">Comprar Combo</a>
        </div>
    </div>
</div>

<div id="imgViewer">
    <div class="close-btn" onclick="closePhoto()"><i class="fas fa-times"></i></div>
    <img id="fullImg" src="" alt="Vista Previa">
</div>

<script>
    function openStore() {
        document.getElementById('storeModal').style.display = 'block';
    }
    
    function closeStore() {
        document.getElementById('storeModal').style.display = 'none';
    }
    
    function viewPhoto(fileName) {
        const viewer = document.getElementById('imgViewer');
        const img = document.getElementById('fullImg');
        img.src = fileName; 
        viewer.style.display = 'flex';
    }
    
    function closePhoto() {
        document.getElementById('imgViewer').style.display = 'none';
    }

    // Cerrar modal al presionar la tecla Escape (para PC)
    document.onkeydown = function(evt) {
        evt = evt || window.event;
        if (evt.keyCode == 27) {
            closeStore();
            closePhoto();
        }
    };
</script>

</body>
</html>
